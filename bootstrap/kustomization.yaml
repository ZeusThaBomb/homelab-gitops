# bootstrap/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - root.yaml
  - sealed-secrets.yaml
  #- ollama.yaml not implemented yet
  #- gpu-operator.yaml not implemented yet
  # add each new Application file here as you create them

# A generated ConfigMap holding shared values — this is your "variables file"
configMapGenerator:
  - name: cluster-vars
    literals:
      - repoURL=https://github.com/ZeusThaBomb/homelab-gitops.git
      - targetRevision=main

# Propagate those values into the Git-sourced Applications, instead of
# hardcoding repoURL/targetRevision in each file individually.
#
# IMPORTANT: Helm-repo-sourced Applications (sealed-secrets -> bitnami.github.io,
# gpu-operator -> helm.ngc.nvidia.com) use the SAME spec.source.repoURL /
# spec.source.targetRevision fields as Git-sourced ones. Kustomize replacements
# match on the field path, not on the value, so without an explicit `reject`
# these would overwrite the Helm repo URL/version with the Git repo's — ArgoCD
# then tries to load a Helm index from the Git repo and fails with 404. Reject
# every Helm-sourced Application by name so the replacement only touches Git apps.
replacements:
  - source:
      kind: ConfigMap
      name: cluster-vars
      fieldPath: data.repoURL
    targets:
      - select:
          kind: Application
        reject:
          - name: sealed-secrets
          - name: gpu-operator
        fieldPaths:
          - spec.source.repoURL
  - source:
      kind: ConfigMap
      name: cluster-vars
      fieldPath: data.targetRevision
    targets:
      - select:
          kind: Application
        reject:
          - name: sealed-secrets
          - name: gpu-operator
        fieldPaths:
          - spec.source.targetRevision