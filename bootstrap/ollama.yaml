apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
spec:
  project: default
  source:
    repoURL: PLACEHOLDER              # filled in by the Kustomize replacement above
    targetRevision: PLACEHOLDER
    path: apps/ollama                 # plain YAML manifests in your repo — MUST already exist
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ "CreateNamespace=true" ]