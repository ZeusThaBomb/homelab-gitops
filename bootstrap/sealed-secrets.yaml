apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets   # Helm repo, not your git repo
    chart: sealed-secrets
    targetRevision: 2.16.1     # ⚠️ CHECK current version at the releases page before committing
    helm:
      valuesObject:
        fullnameOverride: sealed-secrets-controller   # names it what kubeseal expects by default
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [ "CreateNamespace=true" ]